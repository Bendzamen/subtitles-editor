version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8050:8050"
    volumes:
      - /tmp/subtitle_uploads:/tmp/subtitle_uploads
      - whisper_models:/root/.cache/whisper_models
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:3000/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  whisper_models:
